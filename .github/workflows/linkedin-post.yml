name: LinkedIn Auto Poster

on:
  schedule:
    - cron: '30 3 * * 2,4'   # Tue/Thu 8:30am PKT (3:30am UTC = 8:30am PKT)
    - cron: '0 10 * * 3'      # Wed 3:00pm PKT (10:00am UTC = 3:00pm PKT)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (generate but dont post)'
        type: boolean
        default: false

env:
  PYTHON_VERSION: '3.11'

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Generate and post to LinkedIn
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_REFRESH_TOKEN: ${{ secrets.LINKEDIN_REFRESH_TOKEN }}
          LINKEDIN_USER_URN: ${{ secrets.LINKEDIN_USER_URN }}
        run: |
          cd scripts
          python generate_post.py
